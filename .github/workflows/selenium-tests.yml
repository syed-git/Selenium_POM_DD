name: Selenium Tests Pipeline

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Set up ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Run Smoke Tests
      run: mvn test -Dtest=tests.smoke.* -DfailIfNoTests=false

  regression:
    name: Regression Tests
    needs: smoke
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Set up ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Run Regression Tests
      run: mvn test -Dtest=tests.regression.* -DfailIfNoTests=false
